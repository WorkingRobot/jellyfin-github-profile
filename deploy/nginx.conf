# Reverse proxy for jellyfin-github-profile.
#
# Terminate TLS here in production (Let's Encrypt / your own certs) and
# proxy plain HTTP to the app container. The app sets a short
# `Cache-Control: s-maxage=1` on the SVG so GitHub's camo proxy keeps the
# card fresh; this config passes that header through unchanged.

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Do not let nginx add its own caching; honor the app's headers.
        proxy_cache off;
        proxy_buffering off;
    }
}
