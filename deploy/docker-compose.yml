# Example production deployment: app container behind an nginx reverse proxy.
#
#   cp ../.env.example .env   # then fill in JELLYFIN_*
#   docker compose up -d
#
services:
  web:
    image: jellyfin-github-profile
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JELLYFIN_URL: "${JELLYFIN_URL}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY}"
      JELLYFIN_USERNAME: "${JELLYFIN_USERNAME}"
      JELLYFIN_SELF_SIGNED_CERT: "${JELLYFIN_SELF_SIGNED_CERT:-false}"
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
